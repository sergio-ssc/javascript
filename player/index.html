<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <img src="imagens/musica1.jpg" alt="">
    <div class="descricao">
        <h2>Nome da música</h2>
        <i>Nome do artista</i>
    </div>

    <div class="duracao">
            <div class="barra">
                <progress value="0.4" max="1"></progress>
                <div class="ponto"></div>
            </div>
            <div class="tempo">
                <p class="inicio">00:00</p>
                <p class="fim">3:40</p>
            </div>
    </div>
    
        <div class="botoes">
            <i class="fa-solid fa-angle-left setas anterior"></i>
            <i class="fa-solid fa-play play"></i>
            <i class="fa-solid fa-pause pause"></i>
            <i class="fa-solid fa-angle-right setas proxima"></i>
        </div>

        <audio src="musicas/In The Morning - Blue Beat Review.mp3"></audio>




    <script src="script.js"></script>
</body>
</html>
