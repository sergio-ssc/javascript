<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: bisque;
        text-align: center;
        margin-top: 50px;
        
    }

    #res{
        font-size: 20px;
        color: white;
        margin-top: 20px;
        background-color: mediumblue;
        border-radius: 5px;
        text-align: center;
        max-width: 200px;
        margin-left: auto;
        margin-right: auto;
    }

    
</style>



<body>
    <h2>Qual a sua nacionalidade?</h2>
    Insira o seu país: <input type="text" name="txtpais" id="txtpais">
    <input type="button" value="Verificar" onclick="nac()">
    
    <div id="res">

    </div>

    <script>{

        function nac(){
            var txt = document.getElementById('txtpais')
            var res = document.getElementById('res')
            var pais = txt.value

            if ( pais== 'brasil' ) {
            res.innerHTML = `Você é brasileiro`
        } else {
            res.innerHTML = `Você é estrangeiro`
        }

        }
    }
    </script>
</body>
</html>
