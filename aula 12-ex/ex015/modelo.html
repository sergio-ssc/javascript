<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de Idade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Verificador de Idade</h1>
    </header>

<section>

    <div>
        <p>Ano de nascimento: <input type="number" name="txnumber" id="txnumber"></p>

        <p>Sexo: 
            <input type="radio" name="txsex" id="masc" checked>
            <label for="masc">Masculino</label>

            <input type="radio" name="txsex" id="fem">
            <label for="fem">Feminino</label>
        </p>

        <p><input type="button" value="verificar" onclick="verificar()"></p>
    </div>

    <div id="res">
        <p id="resultado">Preencha os dados acima para verificar sua idade.</p>
    </div>

</section>
        

    <footer>
        <p>&copy; Curso em Video.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
