<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background-color: rgb(255, 158, 147);
            font-family: Arial, Helvetica, sans-serif;
        }

        textarea {
            border-radius: 10px;
            width: 200px;
            padding: 5px;
            border: 2px solid black;
            background-color: rgba(234, 220, 220, 0.553);
        }

        button {
            border-radius: 5px;
            padding: 5px;
            background-color: blue;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }

        #QRcodeimage {
            padding: 10px;
            border-radius: 10px;
        }

        button:hover{
            background-color: rgb(33, 33, 243);
            font-size: 1.1rem;
        }
    </style>

</head>
<body>
    <h1>Crie seu QR Code</h1>

    <textarea maxlength="256" rows="10" placeholder="Coloque aqui o texto que você quer transformar em QRCode!"></textarea>
    <button onclick="GerarQRcode()">Gerar QRcode</button>
    <div id="QRcodeimage"></div>




    <script src="script.js"></script>
</body>
</html>
